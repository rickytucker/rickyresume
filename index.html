<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ricky Tucker — Lead Product Designer</title>
  <style>
    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --menubar-h: 30px;
      --dock-w: 108px;
      --glass-light: rgba(255,255,255,0.72);
      --glass-border: rgba(255,255,255,0.55);
      --text-dark: #1a1a2e;
      --text-muted: rgba(30,20,60,0.55);
      --shadow-window: 0 32px 80px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.25);
      --radius-window: 12px;
      --radius-icon: 18px;
      --font: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --resume-accent: 80, 40, 180;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--font);
      user-select: none;
      cursor: default;
    }

    /* ─────────────────────────────────────────
       BACKGROUND LAYERS
    ───────────────────────────────────────── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('assets/fun background.jpg') center/cover no-repeat;
    }

    #bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(80, 40, 180, 0.18);
      transition: background 0.5s ease;
      pointer-events: none;
    }

    /* Subtle scanline texture */
    #scanlines {
      position: fixed; inset: 0; z-index: 2;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
    }

    /* ─────────────────────────────────────────
       MENU BAR
    ───────────────────────────────────────── */
    #menubar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--menubar-h);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: rgba(20,10,40,0.72);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .mb-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mb-logo {
      font-size: 16px;
      color: #fff;
      opacity: 0.9;
    }

    .mb-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .mb-sep {
      width: 1px; height: 14px;
      background: rgba(255,255,255,0.2);
    }

    .mb-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .mb-center {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.03em;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .mb-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mb-status {
      display: flex; align-items: center; gap: 8px;
    }

    .mb-icon {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    #clock {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    /* ─────────────────────────────────────────
       RIGHT ICON DOCK
    ───────────────────────────────────────── */
    #icon-dock {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 8000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 14px 10px;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 22px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      padding: 7px 6px 6px;
      border-radius: 16px;
      border: 1px solid transparent;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.2s ease, border-color 0.2s ease;
    }

    .app-icon:hover { transform: scale(1.08); }
    .app-icon:active { transform: scale(0.94); }

    .app-icon.open {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.3);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .icon-img {
      width: 56px; height: 56px;
      border-radius: var(--radius-icon);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
      transition: box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .icon-img::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.22), transparent);
      border-radius: var(--radius-icon) var(--radius-icon) 0 0;
    }

    .app-icon:hover .icon-img {
      box-shadow: 0 8px 28px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .icon-after-ai  .icon-img { background: linear-gradient(145deg, #a78bfa, #4f46e5); }
    .icon-before-ai .icon-img { background: linear-gradient(145deg, #f97316, #dc2626); }
    .icon-about     .icon-img { background: linear-gradient(145deg, #38bdf8, #0ea5e9); }
    .icon-resume    .icon-img { background: linear-gradient(145deg, #34d399, #059669); }

    .icon-label {
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      letter-spacing: 0.03em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      max-width: 68px;
      line-height: 1.2;
    }

    .icon-dot { display: none; }

    /* ─────────────────────────────────────────
       WINDOWS
    ───────────────────────────────────────── */
    .window {
      position: fixed;
      min-width: 320px;
      min-height: 200px;
      border-radius: var(--radius-window);
      box-shadow: var(--shadow-window);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.45);
      transition: box-shadow 0.2s;
    }

    .window.animating {
      transition: left   0.32s cubic-bezier(0.4,0,0.2,1),
                  top    0.32s cubic-bezier(0.4,0,0.2,1),
                  width  0.32s cubic-bezier(0.4,0,0.2,1),
                  height 0.32s cubic-bezier(0.4,0,0.2,1),
                  border-radius 0.32s cubic-bezier(0.4,0,0.2,1),
                  box-shadow    0.32s cubic-bezier(0.4,0,0.2,1);
    }

    .window.is-resizing {
      transition: left   0.16s cubic-bezier(0.25,0.46,0.45,0.94),
                  top    0.16s cubic-bezier(0.25,0.46,0.45,0.94),
                  width  0.16s cubic-bezier(0.25,0.46,0.45,0.94),
                  height 0.16s cubic-bezier(0.25,0.46,0.45,0.94) !important;
    }

    .window.maximized {
      border-radius: 0 !important;
      border-left-color: transparent;
      border-right-color: transparent;
      border-bottom-color: transparent;
    }

    .window.focused {
      box-shadow: 0 40px 100px rgba(0,0,0,0.55), 0 2px 12px rgba(0,0,0,0.3),
                  0 0 0 1px rgba(255,255,255,0.2);
    }

    .window.minimized .window-body { display: none; }
    .window.minimized .resize-handle { display: none; }

    /* Title Bar */
    .window-titlebar {
      height: 38px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      cursor: grab;
      position: relative;
      /* Classic Mac pinstripe texture */
      background:
        repeating-linear-gradient(
          transparent, transparent 1px,
          rgba(255,255,255,0.06) 1px, rgba(255,255,255,0.06) 2px
        ),
        linear-gradient(to bottom,
          rgba(255,255,255,0.45) 0%,
          rgba(255,255,255,0.22) 100%
        );
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border-bottom: 1px solid rgba(255,255,255,0.35);
    }

    .window-titlebar:active { cursor: grabbing; }

    .window.unfocused .window-titlebar {
      background:
        repeating-linear-gradient(
          transparent, transparent 1px,
          rgba(255,255,255,0.03) 1px, rgba(255,255,255,0.03) 2px
        ),
        linear-gradient(to bottom,
          rgba(255,255,255,0.28) 0%,
          rgba(255,255,255,0.12) 100%
        );
    }

    /* Traffic light buttons */
    .window-controls {
      display: flex;
      gap: 7px;
      align-items: center;
      z-index: 1;
    }

    .wc-btn {
      width: 13px; height: 13px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      transition: filter 0.15s;
      display: flex; align-items: center; justify-content: center;
    }

    .wc-btn::after {
      content: '';
      font-size: 9px;
      font-weight: 900;
      color: rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1;
    }

    .window-controls:hover .wc-btn::after { opacity: 1; }

    .btn-close   { background: #ff5f57; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12); }
    .btn-minimize{ background: #febc2e; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12); }
    .btn-zoom    { background: #28c840; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12); }

    .btn-close::after   { content: '✕'; font-size: 7px; }
    .btn-minimize::after{ content: '−'; font-size: 10px; }
    .btn-zoom::after    { content: '+'; font-size: 10px; }

    .btn-close:hover   { filter: brightness(0.85); }
    .btn-minimize:hover{ filter: brightness(0.85); }
    .btn-zoom:hover    { filter: brightness(0.85); }

    .window-title {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: rgba(20,10,50,0.8);
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    .window.unfocused .window-title { color: rgba(20,10,50,0.4); }

    /* Window Body */
    .window-body {
      flex: 1;
      overflow: auto;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Resize handle */
    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 20px; height: 20px;
      cursor: se-resize;
      z-index: 10;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 4px; right: 4px;
      width: 10px; height: 10px;
      background:
        repeating-linear-gradient(
          -45deg,
          rgba(0,0,0,0.2),
          rgba(0,0,0,0.2) 1px,
          transparent 1px,
          transparent 3px
        );
      border-radius: 1px;
    }

    /* ─── Smiley Window Content ─── */
    .smiley-window {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%; height: 100%;
      padding: 2rem;
    }

    .smiley-emoji {
      font-size: 80px;
      line-height: 1;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.15));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
    }

    .smiley-note {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ─── Resume View ─── */
    .rv {
      width: 100%; height: 100%;
      overflow-y: auto;
      padding: 2.2rem 2.8rem 3rem;
      background: #f8f8fa;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #111;
      cursor: auto;
      user-select: text;
    }
    .rv::-webkit-scrollbar { width: 5px; }
    .rv::-webkit-scrollbar-track { background: transparent; }
    .rv::-webkit-scrollbar-thumb {
      background: rgba(var(--resume-accent), 0.3);
      border-radius: 99px;
    }
    .rv-topbar { display: flex; justify-content: flex-end; margin-bottom: 1.6rem; }
    .rv-download {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.4rem 1rem; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; text-decoration: none;
      border: 1.5px solid rgb(var(--resume-accent));
      color: rgb(var(--resume-accent));
      background: rgba(var(--resume-accent), 0.06);
      transition: background 0.15s;
    }
    .rv-download:hover { background: rgba(var(--resume-accent), 0.14); }
    .rv-header {
      margin-bottom: 2rem; padding-bottom: 1.4rem;
      border-bottom: 2px solid rgb(var(--resume-accent));
    }
    .rv-name {
      font-size: 2.6rem; font-weight: 800; letter-spacing: -0.045em;
      line-height: 1; color: #06060f; margin-bottom: 0.45rem;
    }
    .rv-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.13em;
      text-transform: uppercase; color: rgb(var(--resume-accent)); margin-bottom: 0.7rem;
    }
    .rv-contact {
      display: flex; flex-wrap: wrap; gap: 0 1.4rem;
      font-size: 0.76rem; color: rgba(0,0,0,0.45);
    }
    .rv-contact a { color: rgba(0,0,0,0.45); text-decoration: none; }
    .rv-contact a:hover { color: rgb(var(--resume-accent)); }
    .rv-section {
      display: grid; grid-template-columns: 100px 1fr; gap: 0 1.6rem;
      margin-bottom: 1.6rem; padding-bottom: 1.6rem;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .rv-section:last-child { border-bottom: none; margin-bottom: 0; }
    .rv-label {
      font-size: 0.62rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.15em; color: rgb(var(--resume-accent));
      padding-top: 0.12rem; line-height: 1.5;
    }
    .rv-summary { font-size: 0.82rem; line-height: 1.75; color: rgba(0,0,0,0.62); }
    .rv-job { margin-bottom: 1.1rem; }
    .rv-job:last-child { margin-bottom: 0; }
    .rv-job-head {
      display: flex; flex-wrap: wrap; align-items: baseline;
      gap: 0.2rem 0.55rem; margin-bottom: 0.35rem;
    }
    .rv-company { font-size: 0.86rem; font-weight: 800; color: #06060f; }
    .rv-role { font-size: 0.8rem; color: rgba(0,0,0,0.55); }
    .rv-meta { font-size: 0.7rem; color: rgba(0,0,0,0.35); margin-left: auto; white-space: nowrap; }
    .rv-bullets { list-style: none; padding: 0; }
    .rv-bullets li {
      font-size: 0.78rem; line-height: 1.68; color: rgba(0,0,0,0.6);
      padding-left: 1rem; position: relative; margin-bottom: 0.12rem;
    }
    .rv-bullets li::before {
      content: '—'; position: absolute; left: 0;
      color: rgba(var(--resume-accent), 0.5); font-size: 0.68rem;
    }
    .rv-stat { font-weight: 700; color: rgb(var(--resume-accent)); background: none; }
    .rv-edu-item { margin-bottom: 0.55rem; }
    .rv-edu-item:last-child { margin-bottom: 0; }
    .rv-edu-degree { font-size: 0.84rem; font-weight: 700; color: #06060f; }
    .rv-edu-school { font-size: 0.76rem; color: rgba(0,0,0,0.48); }
    .rv-skills { display: flex; flex-direction: column; gap: 0.5rem; }
    .rv-skill-row { display: flex; gap: 0.6rem; align-items: baseline; }
    .rv-skill-cat {
      font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; color: rgb(var(--resume-accent));
      min-width: 108px; flex-shrink: 0;
    }
    .rv-skill-list { font-size: 0.77rem; color: rgba(0,0,0,0.6); line-height: 1.55; }

    /* ─────────────────────────────────────────
       BEFORE A.I. — MULTI-PROJECT CASE STUDY
    ───────────────────────────────────────── */
    .bai-wrap {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, rgba(255,255,255,0.97) 0%, rgba(248,246,255,0.99) 100%);
      overflow: hidden;
      cursor: auto; user-select: text;
    }

    /* Tab bar */
    .bai-tabs {
      display: flex; flex-shrink: 0;
      padding: 0 1.6rem;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .bai-tab {
      padding: 0.8rem 1.1rem 0.7rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase;
      border: none; background: none; cursor: pointer;
      color: rgba(20,10,40,0.28);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .bai-tab.active[data-panel="usbank"]     { color: rgb(0,82,155);   border-bottom-color: rgb(0,82,155); }
    .bai-tab.active[data-panel="fareharbor"] { color: rgb(120,60,220); border-bottom-color: rgb(120,60,220); }

    /* Panels */
    .bai-panel {
      display: none; flex: 1; overflow-y: auto;
      padding: 1.8rem 2rem 2.4rem;
    }
    .bai-panel::-webkit-scrollbar { width: 4px; }
    .bai-panel::-webkit-scrollbar-track { background: transparent; }
    .bai-panel::-webkit-scrollbar-thumb { background: rgba(var(--bai-accent), 0.22); border-radius: 99px; }
    .bai-panel.active {
      display: block;
      animation: bai-fadein 0.2s ease;
    }
    @keyframes bai-fadein {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Hero */
    .bai-hero { margin-bottom: 1.4rem; }
    .bai-hero-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; }
    .bai-tag {
      font-size: 0.63rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(var(--bai-accent), 0.72);
    }
    .bai-hero-sep {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(var(--bai-accent), 0.3);
      display: inline-block;
    }
    .bai-company {
      font-size: 1.9rem; font-weight: 800; letter-spacing: -0.04em;
      line-height: 1; color: #0a0820; margin-bottom: 0.18rem;
    }
    .bai-role {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgb(var(--bai-accent));
      margin-bottom: 0.8rem;
    }
    .bai-intro {
      font-size: 0.81rem; line-height: 1.8; color: rgba(20,10,40,0.6);
      padding-bottom: 1.35rem;
      border-bottom: 1px solid rgba(var(--bai-accent), 0.1);
    }

    /* Stats */
    .bai-stats {
      display: flex; gap: 0; margin: 1.35rem 0;
      border-radius: 10px; overflow: hidden;
      border: 1px solid rgba(var(--bai-accent), 0.13);
    }
    .bai-stat {
      flex: 1; padding: 0.85rem 0.8rem; text-align: center;
      background: rgba(var(--bai-accent), 0.04);
      border-right: 1px solid rgba(var(--bai-accent), 0.1);
    }
    .bai-stat:last-child { border-right: none; }
    .bai-stat-n {
      font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
      color: rgb(var(--bai-accent)); line-height: 1; margin-bottom: 0.18rem;
    }
    .bai-stat-l {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(20,10,40,0.38);
    }

    /* Section title */
    .bai-section-title {
      font-size: 0.59rem; font-weight: 800; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgb(var(--bai-accent));
      margin-bottom: 0.75rem;
    }

    /* Work grid */
    .bai-work-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.6rem; margin-bottom: 1.4rem;
    }
    .bai-work-card {
      display: flex; gap: 0.65rem; align-items: flex-start;
      padding: 0.85rem; border-radius: 10px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(var(--bai-accent), 0.1);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .bai-work-card:hover {
      border-color: rgba(var(--bai-accent), 0.28);
      box-shadow: 0 4px 14px rgba(var(--bai-accent), 0.08);
    }
    .bai-work-icon { font-size: 1.25rem; line-height: 1; flex-shrink: 0; margin-top: 0.05rem; }

    function createWindow(appId) {
      const cfg = appConfig[appId];
      if (!cfg) return;

      // If already open, bring to front
      if (openWindows[appId]) {
        const existing = openWindows[appId];
        if (existing.classList.contains('minimized')) {
          existing.classList.remove('minimized');
        }
        bringToFront(existing);
        return;
      }

      // Size each window at ~80% of available viewport
      const _mh   = var_menubarH();
      const winW  = Math.round((window.innerWidth  - DOCK_SAFE - WIN_PAD * 2) * 0.80);
      const winH  = Math.round((window.innerHeight - _mh       - WIN_PAD * 2) * 0.80);

      const pos = randomPos(winW, winH);

      const win = document.createElement('div');
      win.className = 'window unfocused';
      win.style.left   = pos.left + 'px';
      win.style.top    = pos.top  + 'px';
      win.style.width  = winW + 'px';
      win.style.height = winH + 'px';
      win.style.zIndex = zTop;

      // Title bar
      const titlebar = document.createElement('div');
      titlebar.className = 'window-titlebar';
      titlebar.innerHTML = `
        <div class="window-controls">
          <button class="wc-btn btn-close"    title="Close"></button>
          <button class="wc-btn btn-minimize" title="Minimize"></button>
          <button class="wc-btn btn-zoom"     title="Zoom"></button>
        </div>
        <div class="window-title">${cfg.title}</div>
      `;

      // Body
      const body = document.createElement('div');
      body.className = 'window-body';
      body.appendChild(cfg.buildContent());

      // Resize handle
      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'resize-handle';

      win.appendChild(titlebar);
      win.appendChild(body);
      win.appendChild(resizeHandle);
      document.body.appendChild(win);

      openWindows[appId] = win;

      // Mark dock icon as open
      const icon = document.querySelector(`.app-icon[data-app="${appId}"]`);
      if (icon) icon.classList.add('open');

      // Bring to front on creation
      bringToFront(win);

      // ── Drag ──
      makeDraggable(win, titlebar);

      // ── Resize ──
      makeResizable(win, resizeHandle);

      // ── Click to focus ──
      win.addEventListener('mousedown', () => bringToFront(win));

      // ── Close button ──
      win.querySelector('.btn-close').addEventListener('click', (e) => {
        e.stopPropagation();
        win.remove();
        delete openWindows[appId];
        if (icon) icon.classList.remove('open');
        document.getElementById('mb-active-title').textContent = '';
        // Re-focus topmost remaining window
        const remaining = document.querySelectorAll('.window');
        if (remaining.length) bringToFront(remaining[remaining.length - 1]);
      });

      // ── Minimize button — restore to original size if maximized, else collapse ──
      const origSize = {
        left: pos.left + 'px', top: pos.top + 'px',
        width: winW + 'px', height: winH + 'px'
      };

      win.querySelector('.btn-minimize').addEventListener('click', (e) => {
        e.stopPropagation();
        if (savedPos) {
          // Currently maximized — restore to original opening size
          win.classList.add('animating');
          setTimeout(() => win.classList.remove('animating'), 350);
          win.style.left   = origSize.left;
          win.style.top    = origSize.top;
          win.style.width  = origSize.width;
          win.style.height = origSize.height;
          win.classList.remove('maximized');
          savedPos = null;
        } else {
          // Normal size — collapse to title bar only
          win.classList.toggle('minimized');
        }
        bringToFront(win);
      });

      // ── Zoom (maximize / restore) ──
      let savedPos = null;

      function toggleMaximize() {
        const mh = var_menubarH();
        win.classList.add('animating');
        setTimeout(() => win.classList.remove('animating'), 350);

        if (!savedPos) {
          // Save current size & position, then go full screen
          savedPos = {
            left: win.style.left, top: win.style.top,
            width: win.style.width, height: win.style.height
          };
          win.style.left   = '0px';
          win.style.top    = mh + 'px';
          win.style.width  = window.innerWidth + 'px';
          win.style.height = (window.innerHeight - mh) + 'px';
          win.classList.add('maximized');
        } else {
          // Restore
          win.style.left   = savedPos.left;
          win.style.top    = savedPos.top;
          win.style.width  = savedPos.width;
          win.style.height = savedPos.height;
          win.classList.remove('maximized');
          savedPos = null;
        }
        bringToFront(win);
      }

      win.querySelector('.btn-zoom').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMaximize();
      });

      // Double-click title bar also toggles maximize
      titlebar.addEventListener('dblclick', (e) => {
        if (e.target.closest('.window-controls')) return;
        toggleMaximize();
      });
    }

    /* ── Drag handler ── */
    function makeDraggable(win, handle) {
      let dragging = false, startX, startY, startL, startT;

      function onStart(ex, ey) {
        dragging = true;
        startX = ex; startY = ey;
        startL = parseInt(win.style.left) || 0;
        startT = parseInt(win.style.top)  || 0;
      }

      function onMove(ex, ey) {
        if (!dragging) return;
        win.style.left = (startL + ex - startX) + 'px';
        win.style.top  = (startT + ey - startY) + 'px';
      }

      function onEnd() { dragging = false; }

      handle.addEventListener('mousedown', (e) => {
        if (e.target.closest('.window-controls')) return;
        bringToFront(win);
        onStart(e.clientX, e.clientY);
        e.preventDefault();
      });

      handle.addEventListener('touchstart', (e) => {
        if (e.target.closest('.window-controls')) return;
        bringToFront(win);
        onStart(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });

      document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
      document.addEventListener('touchmove', (e) => {
        if (dragging) {
          onMove(e.touches[0].clientX, e.touches[0].clientY);
          e.preventDefault();
        }
      }, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
    }

    /* ── Resize handler ── */
    function makeResizable(win, handle) {
      let resizing = false, startX, startY, startW, startH;

      function onStart(ex, ey) {
        resizing = true;
        startX = ex; startY = ey;
        startW = win.offsetWidth;
        startH = win.offsetHeight;
      }

      function onMove(ex, ey) {
        if (!resizing) return;
        win.style.width  = Math.max(320, startW + ex - startX) + 'px';
        win.style.height = Math.max(200, startH + ey - startY) + 'px';
      }

      function onEnd() { resizing = false; }

      handle.addEventListener('mousedown', (e) => {
        onStart(e.clientX, e.clientY);
        bringToFront(win);
        e.preventDefault(); e.stopPropagation();
      });

      handle.addEventListener('touchstart', (e) => {
        onStart(e.touches[0].clientX, e.touches[0].clientY);
        bringToFront(win);
      }, { passive: true });

      document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
      document.addEventListener('touchmove', (e) => {
        if (resizing) {
          onMove(e.touches[0].clientX, e.touches[0].clientY);
          e.preventDefault();
        }
      }, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
    }

    /* ─────────────────────────────────────────
       RESPONSIVE VIEWPORT RESIZE
    ───────────────────────────────────────── */
    const DOCK_SAFE  = 140;  // px reserved on right for the icon dock
    const WIN_PAD    = 8;    // min gap from viewport edges

    function clampWindow(win) {
      const mh = var_menubarH();
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      if (win.classList.contains('maximized')) {
        // Maximized windows fill the new viewport exactly
        win.style.left   = '0px';
        win.style.top    = mh + 'px';
        win.style.width  = vw + 'px';
        win.style.height = (vh - mh) + 'px';
        return;
      }

      let left = parseInt(win.style.left) || 0;
      let top  = parseInt(win.style.top)  || 0;
      const w  = win.offsetWidth;
      const h  = win.offsetHeight;

      // Clamp horizontal: keep at least 120px of title bar inside safe area
      const minVisible = 120;
      const rightBound = vw - DOCK_SAFE;
      left = Math.min(left, rightBound - minVisible);
      left = Math.max(WIN_PAD, left);

      // Clamp vertical: title bar must stay below menubar and above bottom edge
      top = Math.max(mh + WIN_PAD, top);
      top = Math.min(top, vh - 38 - WIN_PAD); // 38 = titlebar height

      win.style.left = left + 'px';
      win.style.top  = top  + 'px';
    }

    let _resizeSettleTimer;
    window.addEventListener('resize', () => {
      // Enable smooth transitions on all windows for the duration of the resize
      document.querySelectorAll('.window').forEach(w => w.classList.add('is-resizing'));

      // Clamp every open window to the new bounds
      Object.values(openWindows).forEach(win => clampWindow(win));

      // Strip the transition class shortly after resize settles
      clearTimeout(_resizeSettleTimer);
      _resizeSettleTimer = setTimeout(() => {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('is-resizing'));
      }, 300);
    });

    /* ─────────────────────────────────────────
       ICON CLICKS
    ───────────────────────────────────────── */
    document.querySelectorAll('.app-icon').forEach(icon => {
      icon.addEventListener('click', () => {
        const appId = icon.dataset.app;
        createWindow(appId);
        // Hide hint after first click
        const hint = document.getElementById('desktop-hint');
        if (hint) hint.style.display = 'none';
      });
    });

    /* ─────────────────────────────────────────
       DESKTOP CLICK — deselect windows
    ───────────────────────────────────────── */
    document.getElementById('bg').addEventListener('click', () => {
      document.querySelectorAll('.window').forEach(w => {
        w.classList.remove('focused');
        w.classList.add('unfocused');
      });
      document.getElementById('mb-active-title').textContent = '';
    });
  </script>
